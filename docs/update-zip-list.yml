name: 📋 更新压缩包选择列表

# ────────────────────────────────────────────────────────────
# 触发条件：
#   1. 根目录有 zip 变更时（push）
#   2. builds/ 目录有 zip 变更时（push，fetch.yml 归档后）
#   3. 手动触发
# 作用：扫描根目录 + builds/ 所有 zip，写入 deploy.yml 下拉选项
#
# ⚠️ 权限说明：修改 .github/workflows/ 需要带 workflow 权限的 PAT
#   Settings → Secrets → Actions → GH_WORKFLOW_TOKEN
# ────────────────────────────────────────────────────────────

on:
  push:
    paths:
      - '*.zip'
      - 'builds/*.zip'
  workflow_dispatch:
    inputs:
      reason:
        description: '手动触发原因（可选）'
        required: false
        default: '手动刷新压缩包列表'

jobs:
  update-list:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # ── 1. 检出仓库 ───────────────────────────────────────
      - name: 📥 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_WORKFLOW_TOKEN }}

      # ── 2. 扫描 zip 并更新 deploy.yml 选项 ───────────────
      - name: 📋 扫描并更新选项列表
        id: scan
        run: |
          # ── 扫描根目录 zip（按 git 提交时间降序）────────────
          declare -A seen_map
          ordered=()

          while IFS= read -r line; do
            f=$(echo "$line" | tr -d '\r')
            # 只收录根目录的 zip（不含路径分隔符）
            if [[ "$f" == *.zip ]] && [[ "$f" != */* ]] && [[ -f "$f" ]] && [[ -z "${seen_map[$f]+x}" ]]; then
              seen_map["$f"]=1
              ordered+=("$f")
            fi
          done < <(git log --name-only --format="" -- "*.zip" 2>/dev/null)

          # 兜底：补充未被 git log 收录的根目录 zip
          while IFS= read -r fname; do
            if [[ -z "${seen_map[$fname]+x}" ]]; then
              seen_map["$fname"]=1
              ordered+=("$fname")
            fi
          done < <(ls -t *.zip 2>/dev/null)

          # ── 扫描 builds/ 目录 zip（按 git 提交时间降序）─────
          declare -A seen_builds
          builds_ordered=()

          while IFS= read -r line; do
            f=$(echo "$line" | tr -d '\r')
            if [[ "$f" == builds/*.zip ]] && [[ -f "$f" ]] && [[ -z "${seen_builds[$f]+x}" ]]; then
              seen_builds["$f"]=1
              builds_ordered+=("$f")
            fi
          done < <(git log --name-only --format="" -- "builds/*.zip" 2>/dev/null)

          # 兜底：补充 builds/ 下未被收录的 zip
          while IFS= read -r fname; do
            if [[ -z "${seen_builds[$fname]+x}" ]]; then
              seen_builds["$fname"]=1
              builds_ordered+=("$fname")
            fi
          done < <(ls -t builds/*.zip 2>/dev/null)

          TOTAL=$(( ${#ordered[@]} + ${#builds_ordered[@]} ))
          echo "📦 根目录 ${#ordered[@]} 个，builds/ ${#builds_builds_ordered[@]} 个，共 $TOTAL 个"
          for f in "${ordered[@]}"; do echo "   - $f"; done
          for f in "${builds_ordered[@]}"; do echo "   - $f"; done

          # ── 构建新 options 条目（10 空格缩进）────────────────
          NEW_OPTIONS="          - 自动选最新"
          for f in "${ordered[@]}"; do
            NEW_OPTIONS="${NEW_OPTIONS}"$'\n'"          - ${f}"
          done
          for f in "${builds_ordered[@]}"; do
            NEW_OPTIONS="${NEW_OPTIONS}"$'\n'"          - ${f}"
          done

          # ── 仅替换 zip_file 字段下的 options 块 ─────────────
          awk -v new_items="$NEW_OPTIONS" '
            /^[[:space:]]*zip_file:/ { in_zip=1 }
            in_zip && /^[[:space:]]*options:/ {
              print "        options:"
              print new_items
              skip=1
              next
            }
            skip && /^[[:space:]]*-[[:space:]]/ { next }
            skip { skip=0; in_zip=0 }
            { print }
          ' .github/workflows/deploy.yml > /tmp/deploy_updated.yml

          if diff -q .github/workflows/deploy.yml /tmp/deploy_updated.yml > /dev/null 2>&1; then
            echo "✅ 列表无变化，无需更新"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            cp /tmp/deploy_updated.yml .github/workflows/deploy.yml
            echo "🔄 列表已更新"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_WORKFLOW_TOKEN: ${{ secrets.GH_WORKFLOW_TOKEN }}

      # ── 3. 提交更新 ───────────────────────────────────────
      - name: 💾 提交 options 更新
        if: steps.scan.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/deploy.yml
          git commit -m "chore: 自动更新压缩包选择列表 [skip ci]"
          git push "https://x-access-token:${{ secrets.GH_WORKFLOW_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref_name }}
          echo "✅ 已更新 deploy.yml 选项列表"