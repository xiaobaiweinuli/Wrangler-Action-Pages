name: ☁ 从 Cloudflare 拉取 Worker

# ────────────────────────────────────────────────────────────
# 触发条件：仅手动触发
# 流程：
#   1. 用 create-cloudflare --existing-script 拉取已部署的 Worker
#   2. 删除 node_modules / package-lock.json 等依赖
#   3. 打包压缩到 builds/{worker_name}-{时间戳}.zip
#   4. commit 推回仓库（触发 update-zip-list.yml 自动更新列表）
# ────────────────────────────────────────────────────────────

on:
  workflow_dispatch:
    inputs:
      worker_name:
        description: 'Cloudflare Worker 名称（Dashboard 上显示的名称）'
        required: true
        type: string
      debug_mode:
        description: '调试模式（输出详细日志）'
        required: false
        default: false
        type: boolean

jobs:
  fetch-worker:
    name: 拉取并归档 Worker
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout 当前部署仓库 ─────────────────────────
      - name: 📥 Checkout 部署仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_WORKFLOW_TOKEN }}

      # ── 2. 配置 Node.js ──────────────────────────────────
      - name: 🟢 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ── 3. 从 Cloudflare 拉取 Worker ─────────────────────
      - name: ☁ 拉取 Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_NAME: ${{ inputs.worker_name }}
          DEBUG_MODE: ${{ inputs.debug_mode }}
          CI: "true"
        run: |
          echo "▶ 开始拉取 Worker: $WORKER_NAME"

          if [ "$DEBUG_MODE" = "true" ]; then
            printf "n\nn\nn\nn\n" | npm create cloudflare@latest "$WORKER_NAME" -- \
              --existing-script "$WORKER_NAME" \
              --no-deploy 2>&1
          else
            printf "n\nn\nn\nn\n" | npm create cloudflare@latest "$WORKER_NAME" -- \
              --existing-script "$WORKER_NAME" \
              --no-deploy > /dev/null 2>&1 || true
          fi

          if [ ! -d "$WORKER_NAME" ]; then
            echo "❌ 拉取失败：目录 $WORKER_NAME 不存在"
            exit 1
          fi

          echo "✅ 拉取完成"

          if [ "$DEBUG_MODE" = "true" ]; then
            echo "=== 目录内容 ==="
            ls -la "$WORKER_NAME/"
            echo "=== src/ 目录 ==="
            ls -la "$WORKER_NAME/src/" 2>/dev/null || echo "（无 src 目录）"
            echo "=== wrangler 配置 ==="
            cat "$WORKER_NAME/wrangler.toml" 2>/dev/null \
              || cat "$WORKER_NAME/wrangler.jsonc" 2>/dev/null \
              || cat "$WORKER_NAME/wrangler.json" 2>/dev/null \
              || echo "（无 wrangler 配置文件）"
          fi

      # ── 4. 删除所有依赖文件 ──────────────────────────────
      - name: 🗑 清理依赖文件
        env:
          WORKER_NAME: ${{ inputs.worker_name }}
          DEBUG_MODE: ${{ inputs.debug_mode }}
        run: |
          rm -rf "$WORKER_NAME/node_modules"
          rm -f  "$WORKER_NAME/package-lock.json"
          rm -f  "$WORKER_NAME/yarn.lock"
          rm -f  "$WORKER_NAME/pnpm-lock.yaml"

          echo "✅ 依赖文件已清理"

          if [ "$DEBUG_MODE" = "true" ]; then
            echo "=== 清理后剩余文件 ==="
            ls -la "$WORKER_NAME/"
          fi

      # ── 5. 打包为 zip，存入 builds/ 目录 ─────────────────
      - name: 📦 打包 Worker
        id: pack
        env:
          WORKER_NAME: ${{ inputs.worker_name }}
          DEBUG_MODE: ${{ inputs.debug_mode }}
        run: |
          TIMESTAMP=$(TZ='Asia/Shanghai' date +%Y%m%d-%H%M%S)
          ZIP_NAME="${WORKER_NAME}-${TIMESTAMP}.zip"
          ZIP_PATH="builds/${ZIP_NAME}"

          mkdir -p builds

          cd "$WORKER_NAME"
          zip -r "../${ZIP_PATH}" . --exclude "*.DS_Store" --exclude "__MACOSX/*" > /dev/null
          cd ..

          echo "✅ 打包完成：$ZIP_PATH（$(du -sh "$ZIP_PATH" | cut -f1)）"

          if [ "$DEBUG_MODE" = "true" ]; then
            echo "=== zip 内容 ==="
            unzip -l "$ZIP_PATH"
          fi

          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "zip_name=$ZIP_NAME"  >> "$GITHUB_OUTPUT"

      # ── 6. 删除临时目录 ──────────────────────────────────
      - name: 🧹 删除临时目录
        env:
          WORKER_NAME: ${{ inputs.worker_name }}
        run: |
          rm -rf "$WORKER_NAME"
          echo "✅ 临时目录已清理"

      # ── 7. 提交并推送 builds/ 目录 ──────────────────────
      - name: 📤 提交到仓库
        env:
          ZIP_NAME: ${{ steps.pack.outputs.zip_name }}
          ZIP_PATH: ${{ steps.pack.outputs.zip_path }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "$ZIP_PATH"

          if git diff --staged --quiet; then
            echo "⚠ 没有新文件，跳过提交"
            exit 0
          fi

          git commit -m "feat(builds): 归档 $ZIP_NAME"
          git push

          echo "✅ 已推送：$ZIP_PATH"
          echo "现在可以在「版本管理」Tab 中找到此归档"