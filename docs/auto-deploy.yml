name: 🤖 自动部署（Push 触发）

# ────────────────────────────────────────────────────────────
# 触发条件：推送 zip 文件到仓库根目录时自动运行
# 逻辑：自动选取根目录中 git 提交时间最新的 zip 进行部署
# ────────────────────────────────────────────────────────────

on:
  push:
    paths:
      - '*.zip'

jobs:
  auto-deploy:
    name: 自动部署最新压缩包
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      # ── 1. 检出仓库 ───────────────────────────────────────
      - name: 📥 检出仓库
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. 配置 Node.js ───────────────────────────────────
      - name: ⚙️ 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. 安装 Wrangler ──────────────────────────────────
      - name: 📦 安装 Wrangler CLI
        run: |
          npm install -g wrangler > /dev/null 2>&1
          echo "✅ $(wrangler --version) 安装完成"

      # ── 4. 自动选根目录最新 zip ───────────────────────────
      - name: 🔍 选取最新压缩包
        id: find-zip
        run: |
          # 按 git 提交时间降序，只扫根目录 *.zip
          LATEST_ZIP=""
          declare -A seen_files
          while IFS= read -r f; do
            f=$(echo "$f" | tr -d '\r')
            if [[ "$f" == *.zip ]] && [[ -f "$f" ]] && [[ -z "${seen_files[$f]+x}" ]]; then
              seen_files["$f"]=1
              [ -z "$LATEST_ZIP" ] && LATEST_ZIP="$f"
            fi
          done < <(git log --name-only --format="" -- "*.zip" 2>/dev/null)

          # 兜底：按文件系统时间排序
          [ -z "$LATEST_ZIP" ] && LATEST_ZIP=$(ls -t *.zip 2>/dev/null | head -1)

          if [ -z "$LATEST_ZIP" ]; then
            echo "❌ 根目录未找到任何 .zip 文件"
            exit 1
          fi

          echo "📦 自动选择：$LATEST_ZIP"
          echo "zip_file=$LATEST_ZIP" >> "$GITHUB_OUTPUT"

      # ── 5. 解压 ───────────────────────────────────────────
      - name: 📂 解压压缩包
        id: extract
        run: |
          ZIP_FILE="${{ steps.find-zip.outputs.zip_file }}"
          EXTRACT_DIR="cf_project_tmp"
          mkdir -p "$EXTRACT_DIR"

          unzip -o "$ZIP_FILE" -d "$EXTRACT_DIR" 2>&1
          echo "✅ 解压完成"

          # 优先级：wrangler.toml > wrangler.jsonc > wrangler.json
          CFG=$(find "$EXTRACT_DIR" -maxdepth 3 -name "wrangler.toml" 2>/dev/null | head -1)
          [ -z "$CFG" ] && CFG=$(find "$EXTRACT_DIR" -maxdepth 3 -name "wrangler.jsonc" 2>/dev/null | head -1)
          [ -z "$CFG" ] && CFG=$(find "$EXTRACT_DIR" -maxdepth 3 -name "wrangler.json" 2>/dev/null | head -1)

          if [ -z "$CFG" ]; then
            echo "❌ 未找到 wrangler 配置文件"
            exit 1
          fi

          PROJECT_DIR=$(dirname "$CFG")
          echo "✅ 项目目录：$PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      # ── 6. 安装依赖 ───────────────────────────────────────
      - name: 📦 安装项目依赖
        run: |
          PROJECT_DIR="${{ steps.extract.outputs.project_dir }}"
          if [ -f "$PROJECT_DIR/package.json" ]; then
            cd "$PROJECT_DIR" && npm install 2>&1 | tail -5
            echo "✅ 依赖安装完成"
          else
            echo "⏭️  无 package.json，跳过"
          fi

      # ── 7. 构建 ───────────────────────────────────────────
      - name: 🔨 构建项目
        run: |
          PROJECT_DIR="${{ steps.extract.outputs.project_dir }}"
          cd "$PROJECT_DIR"
          if [ -f "package.json" ]; then
            HAS_BUILD=$(node -e "try{var p=require('./package.json');console.log(p.scripts&&p.scripts.build?'yes':'no')}catch(e){console.log('no')}")
            if [ "$HAS_BUILD" = "yes" ]; then
              echo "🔨 执行 npm run build..."
              npm run build && echo "✅ 构建完成"
            else
              echo "⏭️  无 build script，跳过"
            fi
          fi

      # ── 8. 部署（静默）───────────────────────────────────
      - name: 🚀 部署到 Cloudflare
        run: |
          cd "${{ steps.extract.outputs.project_dir }}"
          wrangler deploy > /dev/null 2>&1
          if [ $? -eq 0 ]; then
            echo "✅ 部署成功"
          else
            echo "❌ 部署失败，请手动触发并开启调试模式查看详情"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
